name: Deploy Fronend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@2
      - runs: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - runs: docker build -t varshithknaik/docker-complex -f ./client/Dockerfile.dev .
      - runs: docker run -e CI=true varshithknaik/docker-complex npm test
