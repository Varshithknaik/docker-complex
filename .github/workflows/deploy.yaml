name: Deploy Fronend

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t varshithknaik/docker-complex-client -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true varshithknaik/docker-complex-client npm test

      - run: docker build -t varshithknaik/docker-multi-client:${{github.ref_name}} ./client
      - run: docker build -t varshithknaik/docker-multi-nginx:${{github.ref_name}} ./nginx
      - run: docker build -t varshithknaik/docker-multi-server:${{github.ref_name}} ./server
      - run: docker build -t varshithknaik/docker-multi-worker:${{github.ref_name}} ./worker

      - run: docker push varshithknaik/docker-multi-client:${{github.ref_name}}
      - run: docker push varshithknaik/docker-multi-nginx:${{github.ref_name}}
      - run: docker push varshithknaik/docker-multi-server:${{github.ref_name}}
      - run: docker push varshithknaik/docker-multi-worker:${{github.ref_name}}
