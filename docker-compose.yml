services:
  client:
    image: 'varshithknaik/docker-multi-client:latest'
    mem_limit: 128m
    hostname: client
  api:
    image: 'varshithknaik/docker-multi-server'
    restart: always
    mem_limit: 128m
    hostname: api
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
      - PGUSER=$PGUSER
      - PGHOST=$PGHOST
      - PGDATABASE=$PGDATABASE
      - PGPASSWORD=$PGPASSWORD
      - PGPORT=$PGPORT
  worker:
    image: 'varshithknaik/docker-multi-worker'
    mem_limit: 128m
    hostname: worker
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
  nginx:
    image: 'varshithknaik/docker-multi-nginx'
    mem_limit: 128m
    hostname: nginx
    ports:
      - '80:80'
